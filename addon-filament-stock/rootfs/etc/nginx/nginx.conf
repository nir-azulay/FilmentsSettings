worker_processes  1;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections  256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    access_log /dev/stdout;

    # Allow the Ingress proxy headers and large request bodies (color names,
    # notes, etc are tiny; cap at 1MB just in case).
    client_max_body_size 1m;

    server {
        listen 8099 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Static assets - cache-busted hashes from Vite, safe to cache forever.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API - reverse proxy to the FastAPI process on localhost.
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # SPA fallback - serve index.html for any unknown path so client-side
        # routing works. index.html itself must NOT be cached.
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
