configuration:
  ask_if_replaced_spool_empty:
    name: Ask if the replaced spool is empty
    description: >-
      When you assign a new spool to an AMS tray that's already assigned,
      show a "Yes / No" prompt asking whether the spool you're replacing is
      empty. When OFF (the default), the replaced spool is silently
      returned to your stock -- safe for the common "swap colours mid-job"
      case. Turn this ON if you frequently run spools to empty and want to
      mark them as used up at the moment of swap.

network: {}
