name: Filament Stock
version: "0.12.0"
slug: filament_stock
description: 3D printer filament inventory with per-color stock tracking and low-stock alerts. Exposes a panel inside Home Assistant via Ingress.
url: https://github.com/nir-azulay/FilmentsSettings
codeowners:
  - "@nir-azulay"
arch:
  - amd64
  - aarch64
init: false
boot: auto
panel_icon: mdi:printer-3d-nozzle
panel_title: Filaments
ingress: true
ingress_port: 8099
ingress_stream: false
# 0.5.0+: we read AMS tray sensor state from the Home Assistant Core REST API
# (provided by the Supervisor as http://supervisor/core/api). The SUPERVISOR_TOKEN
# env var is auto-injected when homeassistant_api is true. We never write back
# to HA -- pure read-only -- and we never need hassio_api or auth_api.
hassio_api: false
homeassistant_api: true
auth_api: false
host_network: false
ports: {}
# `addon_config` maps the add-on's /config to the user-visible Samba share at
# \\homeassistant\addon_configs\filament_stock\. The SQLite DB lives in
# /config/data/filaments.db so users can drop in a seed file or grab a copy
# without needing SSH. HA snapshots include this directory.
map:
  - addon_config:rw
# 0.8.5+: user-configurable add-on options. Supervisor writes the resolved
# values to /data/options.json inside the container after the user clicks
# "Save" in the add-on's Configuration tab. The backend reads that file on
# startup via app/addon_options.py and exposes the values to the frontend
# at GET /api/config so the UI can honour the user's preferences.
options:
  # When false, the "Is the replaced spool empty?" prompt is hidden in the
  # Assign-from-stock dialog and replaced spools are always returned to
  # stock. Set to true if you want to be asked each time (useful if you
  # frequently swap mid-print and need the option to mark spools as used up).
  ask_if_replaced_spool_empty: false
  # When true, the "Also update the printer's AMS display" checkbox is
  # pre-ticked when you open the Assign-from-stock dialog. Convenient if
  # your printer is on LAN mode and you always want the push. Leave at
  # false when on Cloud-only mode (the push call would always fail).
  default_push_to_printer: false
  # Default low-stock warning threshold for newly created filaments. The
  # add-on raises an alert when an in-stock filament's total (spools + refills)
  # for any color drops to this number or below. Existing filaments keep their
  # individual per-filament thresholds.
  default_low_stock_threshold: 1
  # When true (default), the add-on seeds the database with a curated set of
  # filaments (SUNLU PETG HS, Inslogic ASA, Jayo PLA Pro, etc.) on first run
  # if they don't already exist. Set to false if you want to start from an
  # empty stock and build it up yourself.
  seed_demo_filaments_on_first_run: true
  # How often (seconds) the AMS Status panel polls /api/ams/trays. 15s is
  # a sensible default that matches typical ha-bambulab sensor refresh
  # cadence. Lower it to 5-10s for active printing, raise to 60-120s to
  # reduce load on slow setups. Clamped to 5..300.
  ams_poll_interval_seconds: 15
  # Master opt-out for everything Bambu-related: when true the AMS Status
  # panel is hidden from the dashboard AND the setup checklist skips the
  # Bambu-specific health checks (ha-bambulab installed, printers
  # detected, AMS entities found, bambu_lab.set_filament service). Use
  # this if you don't own a Bambu printer (or just don't want the
  # integration) -- the rest of the add-on still works as a manual
  # stock tracker. Default false (Bambu features ON) so existing
  # installs are unaffected by this release.
  disable_bambu_integration: false
schema:
  ask_if_replaced_spool_empty: bool
  default_push_to_printer: bool
  default_low_stock_threshold: int(1,100)
  seed_demo_filaments_on_first_run: bool
  ams_poll_interval_seconds: int(5,300)
  disable_bambu_integration: bool
